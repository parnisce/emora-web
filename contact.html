<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Get in Touch with Emora</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <a href="/" class="logo">
          <img src="/logo.png" alt="Emora Logo">
          <span>Emora</span>
        </a>
        <nav>
          <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about.html">About Us</a></li>
            <li><a href="/faq.html">FAQ</a></li>
            <li><a href="/blog.html">Blog</a></li>
            <li><a href="/subscription.html">Manage Subscription</a></li>
            <li><a href="/contact.html" class="active">Contact Us</a></li>
          </ul>
        </nav>
        <a href="/subscription.html" class="btn btn-primary">Get App</a>
      </div>
    </header>

    <main>
      <section class="hero secondary-hero">
        <div class="container">
          <h1>Contact Us</h1>
          <p>We'd love to hear from you. Send us a message!</p>
        </div>
      </section>
      
      <section class="contact-section">
        <div class="container">
          <form class="contact-form">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" placeholder="Your Name">
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="your@email.com">
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" rows="5" placeholder="How can we help?"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Send Message</button>
          </form>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
